<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern 2025 Gradient: Purple to Cyan -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <!-- Accent Gradient for OTC element -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    
    <!-- Subtle Glow for Premium Feel -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Container Circle - Clean & Modern -->
  <circle cx="256" cy="256" r="220" fill="#1a1a2e" opacity="0.95"/>
  
  <!-- Geometric Ring - Represents Blockchain Network -->
  <circle 
    cx="256" 
    cy="256" 
    r="200" 
    fill="none" 
    stroke="url(#primaryGradient)" 
    stroke-width="3" 
    opacity="0.4"
  />
  
  <!-- Number "1" - Ultra Modern Typography -->
  <g filter="url(#softGlow)">
    <text 
      x="195" 
      y="310" 
      font-family="system-ui, -apple-system, sans-serif" 
      font-size="180" 
      font-weight="900" 
      fill="url(#primaryGradient)"
      letter-spacing="-8"
    >1</text>
  </g>
  
  <!-- OTC Text - Geometric Representation -->
  <g transform="translate(320, 280)">
    <text 
      x="0" 
      y="0" 
      font-family="system-ui, -apple-system, sans-serif" 
      font-size="65" 
      font-weight="700" 
      fill="url(#textGradient)"
      letter-spacing="2"
    >OTC</text>
  </g>
  
  <!-- Exchange Label -->
  <g transform="translate(256, 370)">
    <text 
      x="0" 
      y="0" 
      font-family="system-ui, -apple-system, sans-serif" 
      font-size="16" 
      font-weight="500" 
      text-anchor="middle" 
      fill="#94A3B8" 
      letter-spacing="4"
    >EXCHANGE</text>
  </g>
  
  <!-- Minimal Accent Lines - Modern Touch -->
  <line 
    x1="180" 
    y1="140" 
    x2="230" 
    y2="140" 
    stroke="url(#primaryGradient)" 
    stroke-width="3" 
    stroke-linecap="round"
  />
  <line 
    x1="282" 
    y1="140" 
    x2="332" 
    y2="140" 
    stroke="url(#primaryGradient)" 
    stroke-width="3" 
    stroke-linecap="round"
  />
  
  <!-- Blockchain Network Dots - Minimalist -->
  <g opacity="0.5">
    <circle cx="140" cy="256" r="4" fill="url(#accentGradient)"/>
    <circle cx="372" cy="256" r="4" fill="url(#accentGradient)"/>
    <circle cx="256" cy="140" r="4" fill="url(#accentGradient)"/>
  </g>
</svg>
