# ============================================================================
# CANTON PARTICIPANT NODE CONFIGURATION
# Canton Wealth Platform - Production Configuration
# ============================================================================

canton {
  # ========================================
  # PARTICIPANT NODE CONFIGURATION
  # ========================================
  participants {
    wealth_participant {
      # Storage Configuration
      storage {
        type = postgres
        # Connection string will be set via environment variable
        # Format: jdbc:postgresql://host:port/database?user=user&password=password
        jdbc-url = ${?CANTON_JDBC_URL}
      }

      # Ledger API Configuration
      ledger-api {
        # Port for Ledger API (JSON API)
        port = 7575
        # Address to bind to (0.0.0.0 for all interfaces)
        address = "0.0.0.0"
        # Enable TLS
        tls = true
        # TLS certificate path
        tls-cert = ${?CANTON_TLS_CERT_PATH}
        # TLS private key path
        tls-key = ${?CANTON_TLS_KEY_PATH}
        # TLS CA certificate path
        tls-ca-cert = ${?CANTON_TLS_CA_CERT_PATH}
        # Max inbound message size (default: 4MB)
        max-inbound-message-size = 4194304
        # Token expiration time (default: 24h)
        token-expiry = 24h
      }

      # Admin API Configuration
      admin-api {
        # Port for Admin API
        port = 7576
        # Address to bind to
        address = "0.0.0.0"
        # Enable TLS
        tls = true
        # TLS certificate path
        tls-cert = ${?CANTON_TLS_CERT_PATH}
        # TLS private key path
        tls-key = ${?CANTON_TLS_KEY_PATH}
        # TLS CA certificate path
        tls-ca-cert = ${?CANTON_TLS_CA_CERT_PATH}
      }

      # Participant ID
      participant-id = "wealth_participant"

      # Party allocation
      parties {
        # Default party for the participant
        default = "WealthPlatform"
      }

      # Domain connection configuration
      domains {
        # Canton testnet domain
        canton-testnet {
          connection {
            # Domain public API URL
            url = "https://testnet.canton.network"
            # TLS configuration
            tls = true
          }
          # Participant authentication token
          participant-token = ${?CANTON_PARTICIPANT_TOKEN}
        }
      }

      # Monitoring configuration
      monitoring {
        # Enable metrics
        metrics {
          enabled = true
          # Metrics port
          port = 9090
          # Metrics address
          address = "0.0.0.0"
        }
        # Enable tracing
        tracing {
          enabled = true
          # Tracing endpoint (Jaeger)
          endpoint = ${?JAEGER_ENDPOINT}
        }
      }

      # Logging configuration
      logging {
        # Log level
        root-level = INFO
        # Canton-specific log level
        canton-level = DEBUG
        # Log format (JSON for production)
        format = json
        # Log file path
        file = ${?CANTON_LOG_FILE}
      }

      # Performance tuning
      performance {
        # Maximum number of concurrent commands
        max-commands-in-flight = 1000
        # Command submission timeout
        command-submission-timeout = 30s
        # Maximum number of active contracts
        max-active-contracts = 1000000
      }

      # Security configuration
      security {
        # Enable authorization
        authorization-enabled = true
        # Enable rate limiting
        rate-limiting-enabled = true
        # Maximum requests per second
        max-requests-per-second = 1000
      }
    }
  }

  # ========================================
  # DOMAIN CONFIGURATION (for local testing)
  # ========================================
  domains {
    local {
      # Domain ID
      domain-id = "local-domain"
      
      # Domain manager configuration
      domain-manager {
        # Storage configuration
        storage {
          type = postgres
          jdbc-url = ${?CANTON_DOMAIN_JDBC_URL}
        }
        
        # Public API configuration
        public-api {
          port = 7577
          address = "0.0.0.0"
          tls = true
          tls-cert = ${?CANTON_TLS_CERT_PATH}
          tls-key = ${?CANTON_TLS_KEY_PATH}
          tls-ca-cert = ${?CANTON_TLS_CA_CERT_PATH}
        }
        
        # Admin API configuration
        admin-api {
          port = 7578
          address = "0.0.0.0"
          tls = true
          tls-cert = ${?CANTON_TLS_CERT_PATH}
          tls-key = ${?CANTON_TLS_KEY_PATH}
          tls-ca-cert = ${?CANTON_TLS_CA_CERT_PATH}
        }
      }
      
      # Sequencer configuration
      sequencer {
        # Sequencer type
        type = "database"
        # Storage configuration
        storage {
          type = postgres
          jdbc-url = ${?CANTON_DOMAIN_JDBC_URL}
        }
      }
      
      # Mediator configuration
      mediator {
        # Mediator type
        type = "database"
        # Storage configuration
        storage {
          type = postgres
          jdbc-url = ${?CANTON_DOMAIN_JDBC_URL}
        }
      }
    }
  }

  # ========================================
  # GLOBAL CONFIGURATION
  # ========================================
  
  # TLS configuration
  tls {
    # Enable TLS for all connections
    enabled = true
    # TLS version
    version = "TLSv1.3"
    # Cipher suites
    cipher-suites = [
      "TLS_AES_256_GCM_SHA384",
      "TLS_AES_128_GCM_SHA256",
      "TLS_CHACHA20_POLY1305_SHA256"
    ]
  }

  # Time provider configuration
  time-provider {
    # Clock type (monotonic or wall-clock)
    clock-type = "monotonic"
    # Tolerance for clock skew
    tolerance = 5s
  }

  # Crypto configuration
  crypto {
    # Signing algorithm
    signing-algorithm = "Ed25519"
    # Hashing algorithm
    hashing-algorithm = "SHA256"
    # Key size
    key-size = 256
  }

  # Ledger API configuration
  ledger-api {
    # Maximum number of active contracts
    max-active-contracts = 1000000
    # Maximum number of active parties
    max-active-parties = 10000
    # Maximum number of transactions per second
    max-transactions-per-second = 1000
  }
}
