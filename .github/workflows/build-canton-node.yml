name: Build and Push canton-node image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag"
        required: true
        default: "0.4.19"
  push:
    paths:
      - 'blockchain/validator-image/**'
      - '.github/workflows/build-canton-node.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=0.4.19" >> $GITHUB_OUTPUT
          fi
      - name: Lowercase owner
        id: lc
        run: |
          owner="${{ github.repository_owner }}"
          echo "owner_lc=${owner,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./blockchain/validator-image
          file: ./blockchain/validator-image/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lc.outputs.owner_lc }}/canton-node:${{ steps.v.outputs.version }}
            ghcr.io/${{ steps.lc.outputs.owner_lc }}/canton-node:latest
          build-args: |
            CANTON_VERSION=${{ steps.v.outputs.version }}


