apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canton-otc-ingress-https
  namespace: canton-otc
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: canton-otc-rate-limit-ddos-protection@kubernetescrd,canton-otc-security-headers-enhanced@kubernetescrd
    # cert-manager.io/cluster-issuer удалена - используем явный Certificate ресурс
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - 1otc.cc
    - cantonotc.com
    - canton-otc.com
    secretName: canton-otc-tls
  rules:
  - host: 1otc.cc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canton-otc-service
            port:
              number: 80
  - host: cantonotc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canton-otc-service
            port:
              number: 80
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-1otc
  namespace: canton-otc
spec:
  redirectRegex:
    regex: ^https?://(canton-otc\.com)(.*)
    replacement: https://1otc.cc${2}
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canton-otc-redirect-ingress
  namespace: canton-otc
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: canton-otc-redirect-to-1otc@kubernetescrd
    # cert-manager.io/cluster-issuer удалена - используем явный Certificate ресурс
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - canton-otc.com
    secretName: canton-otc-tls
  rules:
  - host: canton-otc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canton-otc-service
            port:
              number: 80
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: canton-otc
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canton-otc-ingress-redirect
  namespace: canton-otc
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: canton-otc-https-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: 1otc.cc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canton-otc-service
            port:
              number: 80
  - host: cantonotc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canton-otc-service
            port:
              number: 80
  - host: canton-otc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canton-otc-service
            port:
              number: 80