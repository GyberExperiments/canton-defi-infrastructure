apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: canton-otc-minimal-stage-tls
  namespace: canton-otc-minimal-stage
spec:
  secretName: canton-otc-minimal-stage-tls
  commonName: stage.minimal.build.infra.1otc.cc
  dnsNames:
  - stage.minimal.build.infra.1otc.cc
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod

