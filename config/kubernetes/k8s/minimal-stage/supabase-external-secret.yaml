apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-github-secrets
  namespace: supabase
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: github-secrets-store
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: SUPABASE_POSTGRES_PASSWORD
  - secretKey: JWT_SECRET
    remoteRef:
      key: SUPABASE_JWT_SECRET
  - secretKey: ANON_KEY
    remoteRef:
      key: SUPABASE_ANON_KEY
  - secretKey: SERVICE_ROLE_KEY
    remoteRef:
      key: SUPABASE_SERVICE_ROLE_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-rsa-keys
  namespace: supabase
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: github-secrets-store
    kind: ClusterSecretStore
  target:
    name: auth-rsa-keys
    creationPolicy: Owner
  data:
  - secretKey: private_key
    remoteRef:
      key: SUPABASE_RSA_PRIVATE_KEY
  - secretKey: public_key
    remoteRef:
      key: SUPABASE_RSA_PUBLIC_KEY