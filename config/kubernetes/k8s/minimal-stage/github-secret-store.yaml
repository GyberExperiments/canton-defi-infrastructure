# GitHub Secret Store для External Secrets Operator
# Позволяет External Secrets Operator получать секреты из GitHub

apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: canton-otc-minimal-stage
type: Opaque
data:
  # GitHub Personal Access Token (base64 encoded)
  # Получить токен: GitHub Settings -> Developer settings -> Personal access tokens
  # Нужны права: repo (Full control of private repositories)
  token: "" # Заменить на base64 encoded GitHub token
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: github-secrets-store
  namespace: canton-otc-minimal-stage
spec:
  provider:
    github:
      url: https://api.github.com
      auth:
        secretRef:
          accessToken:
            name: github-token
            key: token
  # Настройки для GitHub API
  refreshInterval: 30s # Обновляем каждые 30 секунд
  retrySettings:
    maxRetries: 3
    retryInterval: 10s
