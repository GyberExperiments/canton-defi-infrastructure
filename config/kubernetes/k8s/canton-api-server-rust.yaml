apiVersion: apps/v1
kind: Deployment
metadata:
  name: canton-api-server
  namespace: canton-otc
  labels:
    app: canton-api-server
    component: ledger-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: canton-api-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: canton-api-server
        component: ledger-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: canton-api-server
          image: ghcr.io/themacroeconomicdao/canton-api-server:latest
          imagePullPolicy: Always
          env:
            - name: CANTON_LEDGER_HOST
              value: participant.validator.svc.cluster.local
            - name: CANTON_LEDGER_PORT
              value: "5001"
            - name: CANTON_APPLICATION_ID
              value: canton-otc-platform
            - name: CANTON_PARTY_ID
              value: otc_operator
            - name: CANTON_LEDGER_ID
              value: canton-otc
            - name: OTC_PACKAGE_ID
              value: canton-otc-v1
            - name: PORT
              value: "8080"
            - name: RUST_LOG
              value: "info,canton_otc_api=debug"
            - name: CANTON_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: canton-auth
                  key: token
                  optional: true
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
