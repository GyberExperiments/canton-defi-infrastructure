# GitHub Secret Store для External Secrets Operator (Production)
# Best Practice: Namespace isolation, безопасное хранение токенов, retry механизм
# Позволяет External Secrets Operator получать секреты из GitHub

apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: canton-otc
  labels:
    app: external-secrets
    managed-by: external-secrets
type: Opaque
stringData:
  # GitHub Personal Access Token
  # Получить токен: GitHub Settings -> Developer settings -> Personal access tokens
  # Нужны права: repo (Full control of private repositories), read:org
  # Best Practice: Использовать Fine-grained token с минимальными правами
  token: "" # Будет установлен через kubectl create secret
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: github-secrets-store
  namespace: canton-otc
  labels:
    app: external-secrets
    managed-by: external-secrets
spec:
  provider:
    github:
      url: https://api.github.com
      owner: TheMacroeconomicDao
      repository: CantonOTC
      auth:
        secretRef:
          accessToken:
            name: github-token
            key: token
  # Best Practice: Retry настройки для надежности
  retrySettings:
    maxRetries: 3
    retryInterval: 10s
