apiVersion: apps/v1
kind: Deployment
metadata:
  name: canton-otc-stage
  namespace: canton-otc-stage
  labels:
    app: canton-otc-stage
    version: v1.0.0-stage
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: canton-otc-stage
  template:
    metadata:
      labels:
        app: canton-otc-stage
        version: v1.0.0-stage
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: canton-otc-stage
        image: ghcr.io/themacroeconomicdao/cantonotc:stage
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        # Public environment variables
        - name: NODE_ENV
          value: "development"
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
        - name: PORT
          value: "3000"
        - name: NEXT_PUBLIC_APP_URL
          value: "https://stage.cantonotc.com"
        
        # Sensitive data from Secret
        - name: GOOGLE_SHEET_ID
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: GOOGLE_SHEET_ID
        - name: GOOGLE_SERVICE_ACCOUNT_EMAIL
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        - name: GOOGLE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: GOOGLE_PRIVATE_KEY
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: TELEGRAM_BOT_TOKEN
        - name: TELEGRAM_CHAT_ID
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: TELEGRAM_CHAT_ID
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_PORT
        - name: SMTP_SECURE
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_SECURE
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_USER
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_PASSWORD
              optional: true
        - name: SMTP_FROM_ADDRESS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_FROM_ADDRESS
        - name: SMTP_FROM_NAME
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SMTP_FROM_NAME
        - name: USDT_RECEIVING_ADDRESS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: USDT_RECEIVING_ADDRESS
              optional: true
        - name: CANTON_COIN_PRICE_USD
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: CANTON_COIN_PRICE_USD
        - name: ADMIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: ADMIN_API_KEY
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: NEXTAUTH_SECRET
        - name: NEXTAUTH_URL
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: NEXTAUTH_URL
        
        # Intercom Configuration
        - name: NEXT_PUBLIC_INTERCOM_APP_ID
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: NEXT_PUBLIC_INTERCOM_APP_ID
        - name: INTERCOM_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: INTERCOM_ACCESS_TOKEN
        - name: INTERCOM_ADMIN_ID
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: INTERCOM_ADMIN_ID
        
        # Canton Coin Prices
        - name: CANTON_COIN_BUY_PRICE_USD
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: CANTON_COIN_BUY_PRICE_USD
        - name: CANTON_COIN_SELL_PRICE_USD
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: CANTON_COIN_SELL_PRICE_USD
        
        # Trading Limits
        - name: MIN_USDT_AMOUNT
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: MIN_USDT_AMOUNT
        - name: MAX_USDT_AMOUNT
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: MAX_USDT_AMOUNT
        
        # Receiving Addresses
        - name: ETH_RECEIVING_ADDRESS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: ETH_RECEIVING_ADDRESS
        - name: TRON_RECEIVING_ADDRESS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: TRON_RECEIVING_ADDRESS
        - name: SOLANA_RECEIVING_ADDRESS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SOLANA_RECEIVING_ADDRESS
        - name: OPTIMISM_RECEIVING_ADDRESS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: OPTIMISM_RECEIVING_ADDRESS
        
        # Contact Information
        - name: SUPPORT_EMAIL
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: SUPPORT_EMAIL
        - name: TELEGRAM_BOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: TELEGRAM_BOT_USERNAME
        - name: BUSINESS_HOURS
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: BUSINESS_HOURS
        
        # Google Sheets Configuration
        - name: GOOGLE_SHEETS_RANGE
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: GOOGLE_SHEETS_RANGE
        
        # Admin Configuration
        - name: ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: ADMIN_EMAIL
        - name: ADMIN_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: ADMIN_PASSWORD_HASH
        - name: ADMIN_NAME
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: ADMIN_NAME
        
        # HD Wallet and Blockchain Configuration
        - name: HD_WALLET_SEED
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: HD_WALLET_SEED
        - name: TRON_API_KEY
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: TRON_API_KEY
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: canton-otc-stage-secrets
              key: REDIS_URL
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
