# 🔐 Canton OTC Secrets Template for CI/CD
# This template uses environment variable substitution

apiVersion: v1
kind: Secret
metadata:
  name: canton-otc-secrets
  namespace: canton-otc
type: Opaque
data:
  # Google Sheets Configuration (will be base64 encoded by workflow)
  GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID_B64}
  GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL_B64}
  GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY_B64}
  
  # Telegram Bot Configuration (will be base64 encoded by workflow)
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_B64}
  TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID_B64}
  
  # SMTP Configuration (will be base64 encoded by workflow)
  SMTP_HOST: ${SMTP_HOST_B64}
  SMTP_PORT: ${SMTP_PORT_B64}
  SMTP_SECURE: ${SMTP_SECURE_B64}
  SMTP_USER: ${SMTP_USER_B64}
  SMTP_PASSWORD: ${SMTP_PASSWORD_B64}
  SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS_B64}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME_B64}
  
  # OTC Configuration (will be base64 encoded by workflow)
  USDT_RECEIVING_ADDRESS: ${USDT_RECEIVING_ADDRESS_B64}
  CANTON_COIN_PRICE_USD: ${CANTON_COIN_PRICE_USD_B64}
  CANTON_COIN_BUY_PRICE_USD: ${CANTON_COIN_BUY_PRICE_USD_B64}
  CANTON_COIN_SELL_PRICE_USD: ${CANTON_COIN_SELL_PRICE_USD_B64}
  
  # Trading Limits (will be base64 encoded by workflow)
  MIN_USDT_AMOUNT: ${MIN_USDT_AMOUNT_B64}
  MAX_USDT_AMOUNT: ${MAX_USDT_AMOUNT_B64}
  
  
  # Receiving Addresses (will be base64 encoded by workflow)
  ETH_RECEIVING_ADDRESS: ${ETH_RECEIVING_ADDRESS_B64}
  TRON_RECEIVING_ADDRESS: ${TRON_RECEIVING_ADDRESS_B64}
  SOLANA_RECEIVING_ADDRESS: ${SOLANA_RECEIVING_ADDRESS_B64}
  OPTIMISM_RECEIVING_ADDRESS: ${OPTIMISM_RECEIVING_ADDRESS_B64}
  
  # Contact Information (will be base64 encoded by workflow)
  SUPPORT_EMAIL: ${SUPPORT_EMAIL_B64}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME_B64}
  BUSINESS_HOURS: ${BUSINESS_HOURS_B64}
  
  # Google Sheets Configuration (will be base64 encoded by workflow)
  GOOGLE_SHEETS_RANGE: ${GOOGLE_SHEETS_RANGE_B64}
  
  # Admin Configuration (will be base64 encoded by workflow)
  ADMIN_EMAIL: ${ADMIN_EMAIL_B64}
  ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH_B64}
  ADMIN_NAME: ${ADMIN_NAME_B64}
  
  # Security (will be base64 encoded by workflow)
  ADMIN_API_KEY: ${ADMIN_API_KEY_B64}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET_B64}
  NEXTAUTH_URL: ${NEXTAUTH_URL_B64}
  
  # HD Wallet and Blockchain Configuration (will be base64 encoded by workflow)
  HD_WALLET_SEED: ${HD_WALLET_SEED_B64}
  TRON_API_KEY: ${TRON_API_KEY_B64}
  REDIS_URL: ${REDIS_URL_B64}
  
  # Intercom Configuration (will be base64 encoded by workflow)
  NEXT_PUBLIC_INTERCOM_APP_ID: ${NEXT_PUBLIC_INTERCOM_APP_ID_B64}
  INTERCOM_ACCESS_TOKEN: ${INTERCOM_ACCESS_TOKEN_B64}
  INTERCOM_ADMIN_ID: ${INTERCOM_ADMIN_ID_B64}
  INTERCOM_WEBHOOK_SECRET: ${INTERCOM_WEBHOOK_SECRET_B64}
  INTERCOM_API_SECRET: ${INTERCOM_API_SECRET_B64}
  
  # Telegram Mediator Bot Configuration (will be base64 encoded by workflow)
  # ✅ ИСПОЛЬЗУЕМ ОДИН БОТ: TELEGRAM_MEDIATOR_BOT_TOKEN опционален (fallback на TELEGRAM_BOT_TOKEN)
  TELEGRAM_MEDIATOR_BOT_TOKEN: ${TELEGRAM_MEDIATOR_BOT_TOKEN_B64}
  # ✅ TELEGRAM_MEDIATOR_CHAT_ID опционален (fallback на TELEGRAM_CHAT_ID)
  TELEGRAM_MEDIATOR_CHAT_ID: ${TELEGRAM_MEDIATOR_CHAT_ID_B64}
  TELEGRAM_MEDIATOR_WEBHOOK_SECRET: ${TELEGRAM_MEDIATOR_WEBHOOK_SECRET_B64}
  # ✅ Telegram Client Group (группа для заявок клиентов)
  TELEGRAM_CLIENT_GROUP_CHAT_ID: ${TELEGRAM_CLIENT_GROUP_CHAT_ID_B64}
  
  # Telegram Client API Configuration (для отправки сообщений от администратора)
  # ✅ Используется для отправки сообщений клиентам без требования /start
  TELEGRAM_API_ID: ${TELEGRAM_API_ID_B64}
  TELEGRAM_API_HASH: ${TELEGRAM_API_HASH_B64}
  TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING_B64}
  
  # Supabase Configuration (will be base64 encoded by workflow)
  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL_B64}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY_B64}
  
  # Additional Configuration (will be base64 encoded by workflow)
  ALERT_EMAIL: ${ALERT_EMAIL_B64}
  
  # GitHub API Configuration (will be base64 encoded by workflow)
  API_TOKEN: ${API_TOKEN_B64}
  REPO_OWNER: ${REPO_OWNER_B64}
  REPO_NAME: ${REPO_NAME_B64}
  WORKFLOW_ID: ${WORKFLOW_ID_B64}
  WORKFLOW_BRANCH: ${WORKFLOW_BRANCH_B64}
  
  # NEAR DEX Configuration (will be base64 encoded by workflow)
  NEAR_DEX_FEE_RECIPIENT: ${NEAR_DEX_FEE_RECIPIENT_B64}
  
  # Rate Limiting Configuration (will be base64 encoded by workflow)
  RATE_LIMIT_ORDER_POINTS: ${RATE_LIMIT_ORDER_POINTS_B64}
  RATE_LIMIT_ORDER_DURATION: ${RATE_LIMIT_ORDER_DURATION_B64}
  RATE_LIMIT_IP_POINTS: ${RATE_LIMIT_IP_POINTS_B64}
  RATE_LIMIT_IP_DURATION: ${RATE_LIMIT_IP_DURATION_B64}
  RATE_LIMIT_EMAIL_POINTS: ${RATE_LIMIT_EMAIL_POINTS_B64}
  RATE_LIMIT_EMAIL_DURATION: ${RATE_LIMIT_EMAIL_DURATION_B64}
  
  # Anti-Spam Configuration (will be base64 encoded by workflow)
  ENABLE_ANTI_SPAM: ${ENABLE_ANTI_SPAM_B64}
  ANTI_SPAM_DUPLICATE_WINDOW: ${ANTI_SPAM_DUPLICATE_WINDOW_B64}
  ANTI_SPAM_RAPID_WINDOW: ${ANTI_SPAM_RAPID_WINDOW_B64}
  ANTI_SPAM_MAX_ORDERS: ${ANTI_SPAM_MAX_ORDERS_B64}
  ANTI_SPAM_BLOCK_DURATION: ${ANTI_SPAM_BLOCK_DURATION_B64}
  ANTI_SPAM_CLEANUP_INTERVAL: ${ANTI_SPAM_CLEANUP_INTERVAL_B64}