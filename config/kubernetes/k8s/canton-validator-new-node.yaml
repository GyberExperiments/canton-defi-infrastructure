apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: canton-node-new
  namespace: canton-node
  labels:
    app: canton-node
    component: validator
    version: "0.4.19"
    node: "new-validator"
spec:
  serviceName: canton-node-new
  replicas: 1
  selector:
    matchLabels:
      app: canton-node
      node: "new-validator"
  template:
    metadata:
      labels:
        app: canton-node
        component: validator
        version: "0.4.19"
        node: "new-validator"
    spec:
      # Host networking для прямого доступа по IP
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      
      # Привязка к новому серверу (IP: 65.108.15.30)
      # Замените hostname на реальный hostname нового сервера после подключения к кластеру
      nodeSelector:
        kubernetes.io/hostname: "canton-node-65-108-15-30"  # Будет установлен после подключения ноды
      
      # Толерантность к taint'ам ноды
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoSchedule
      
      # Секреты для pull образа
      imagePullSecrets:
      - name: ghcr-creds
      
      containers:
      - name: canton-validator
        image: ghcr.io/themacroeconomicdao/canton-node:0.4.19
        imagePullPolicy: Always
        
        # Порты
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: admin
          containerPort: 8082
          protocol: TCP
        - name: ledger-grpc
          containerPort: 6865
          protocol: TCP
        
        # Переменные окружения
        env:
        - name: CANTON_VERSION
          value: "0.4.19"
        - name: CANTON_API
          value: "https://sv.sv-1.dev.global.canton.network.sync.global"
        - name: PARTY_HINT
          value: "gyber-validator"
        - name: VALIDATOR_MODE
          value: "0"  # 0=validator, 1=observer
        
        # Секреты
        - name: ONBOARDING_SECRET
          valueFrom:
            secretKeyRef:
              name: canton-onboarding
              key: ONBOARDING_SECRET
        
        # Ресурсы
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2
            memory: 4Gi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Volumes для данных
        volumeMounts:
        - name: canton-data
          mountPath: /opt/canton/data
        - name: canton-logs
          mountPath: /opt/canton/logs
        - name: canton-config
          mountPath: /opt/canton/config
          readOnly: true
        
        # Безопасность
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      
      # Volumes
      volumes:
      - name: canton-data
        hostPath:
          path: /var/lib/canton/data
          type: DirectoryOrCreate
      - name: canton-logs
        hostPath:
          path: /var/lib/canton/logs
          type: DirectoryOrCreate
      - name: canton-config
        configMap:
          name: canton-config
          items:
          - key: canton.conf
            path: canton.conf
          - key: validator.conf
            path: validator.conf
      
      # Restart policy
      restartPolicy: Always
      
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: canton-node-new
  namespace: canton-node
  labels:
    app: canton-node
    component: validator
    node: "new-validator"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: health
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: admin
    port: 8082
    targetPort: 8082
    protocol: TCP
  - name: ledger-grpc
    port: 6865
    targetPort: 6865
    protocol: TCP
  selector:
    app: canton-node
    node: "new-validator"

