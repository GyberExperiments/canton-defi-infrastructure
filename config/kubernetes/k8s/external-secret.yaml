# External Secret для автоматической синхронизации GitHub Secrets с Kubernetes (Production)
# Синхронизирует критические секреты из GitHub в Kubernetes
# Best Practice: Namespace isolation, автоматическое обновление, мониторинг

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canton-otc-github-secrets
  namespace: canton-otc
  labels:
    app: canton-otc
    environment: production
    managed-by: external-secrets
spec:
  # Best Practice: Refresh interval для production (1h) - баланс между актуальностью и нагрузкой
  refreshInterval: 1h
  
  # Ссылка на Secret Store (в том же namespace для изоляции)
  secretStoreRef:
    name: github-secrets-store
    kind: SecretStore
  
  # Целевой Kubernetes Secret
  target:
    name: canton-otc-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: canton-otc
          environment: production
          managed-by: external-secrets
  
  # Синхронизируемые секреты
  data:
  # Критические секреты для аутентификации
  - secretKey: ADMIN_EMAIL
    remoteRef:
      key: ADMIN_EMAIL
  - secretKey: ADMIN_PASSWORD_HASH
    remoteRef:
      key: ADMIN_PASSWORD_HASH
  - secretKey: ADMIN_NAME
    remoteRef:
      key: ADMIN_NAME
  - secretKey: ADMIN_API_KEY
    remoteRef:
      key: ADMIN_API_KEY
  - secretKey: NEXTAUTH_SECRET
    remoteRef:
      key: NEXTAUTH_SECRET
  - secretKey: NEXTAUTH_URL
    remoteRef:
      key: NEXTAUTH_URL
  
  # Google Sheets интеграция
  - secretKey: GOOGLE_SHEET_ID
    remoteRef:
      key: GOOGLE_SHEET_ID
  - secretKey: GOOGLE_SERVICE_ACCOUNT_EMAIL
    remoteRef:
      key: GOOGLE_SERVICE_ACCOUNT_EMAIL
  - secretKey: GOOGLE_PRIVATE_KEY
    remoteRef:
      key: GOOGLE_PRIVATE_KEY
  - secretKey: GOOGLE_SHEETS_RANGE
    remoteRef:
      key: GOOGLE_SHEETS_RANGE
  
  # Telegram интеграция
  - secretKey: TELEGRAM_BOT_TOKEN
    remoteRef:
      key: TELEGRAM_BOT_TOKEN
  - secretKey: TELEGRAM_CHAT_ID
    remoteRef:
      key: TELEGRAM_CHAT_ID
  - secretKey: TELEGRAM_BOT_USERNAME
    remoteRef:
      key: TELEGRAM_BOT_USERNAME
  
  # Telegram Mediator Bot
  - secretKey: TELEGRAM_MEDIATOR_BOT_TOKEN
    remoteRef:
      key: TELEGRAM_MEDIATOR_BOT_TOKEN
  - secretKey: TELEGRAM_MEDIATOR_CHAT_ID
    remoteRef:
      key: TELEGRAM_MEDIATOR_CHAT_ID
  - secretKey: TELEGRAM_MEDIATOR_WEBHOOK_SECRET
    remoteRef:
      key: TELEGRAM_MEDIATOR_WEBHOOK_SECRET
  # ✅ Telegram Client Group (группа для заявок клиентов)
  - secretKey: TELEGRAM_CLIENT_GROUP_CHAT_ID
    remoteRef:
      key: TELEGRAM_CLIENT_GROUP_CHAT_ID
  
  # Supabase Configuration
  - secretKey: NEXT_PUBLIC_SUPABASE_URL
    remoteRef:
      key: NEXT_PUBLIC_SUPABASE_URL
  - secretKey: SUPABASE_SERVICE_ROLE_KEY
    remoteRef:
      key: SUPABASE_SERVICE_ROLE_KEY
  # Supabase JWT Configuration
  - secretKey: SUPABASE_JWT_SECRET
    remoteRef:
      key: SUPABASE_JWT_SECRET
  - secretKey: SUPABASE_ANON_KEY
    remoteRef:
      key: SUPABASE_ANON_KEY
  - secretKey: SUPABASE_POSTGRES_PASSWORD
    remoteRef:
      key: SUPABASE_POSTGRES_PASSWORD
  
  # Intercom интеграция
  - secretKey: INTERCOM_APP_ID
    remoteRef:
      key: INTERCOM_APP_ID
  - secretKey: NEXT_PUBLIC_INTERCOM_APP_ID
    remoteRef:
      key: NEXT_PUBLIC_INTERCOM_APP_ID
  - secretKey: INTERCOM_ACCESS_TOKEN
    remoteRef:
      key: INTERCOM_ACCESS_TOKEN
  - secretKey: INTERCOM_ADMIN_ID
    remoteRef:
      key: INTERCOM_ADMIN_ID
  - secretKey: INTERCOM_API_SECRET
    remoteRef:
      key: INTERCOM_API_SECRET
  - secretKey: INTERCOM_WEBHOOK_SECRET
    remoteRef:
      key: INTERCOM_WEBHOOK_SECRET
  
  # SMTP конфигурация
  - secretKey: SMTP_HOST
    remoteRef:
      key: SMTP_HOST
  - secretKey: SMTP_PORT
    remoteRef:
      key: SMTP_PORT
  - secretKey: SMTP_SECURE
    remoteRef:
      key: SMTP_SECURE
  - secretKey: SMTP_USER
    remoteRef:
      key: SMTP_USER
  - secretKey: SMTP_PASSWORD
    remoteRef:
      key: SMTP_PASSWORD
  - secretKey: SMTP_FROM_ADDRESS
    remoteRef:
      key: SMTP_FROM_ADDRESS
  - secretKey: SMTP_FROM_NAME
    remoteRef:
      key: SMTP_FROM_NAME
  
  # Дополнительные настройки
  - secretKey: SUPPORT_EMAIL
    remoteRef:
      key: SUPPORT_EMAIL
  - secretKey: ALERT_EMAIL
    remoteRef:
      key: ALERT_EMAIL
  
  # GitHub API конфигурация
  - secretKey: API_TOKEN
    remoteRef:
      key: API_TOKEN
  - secretKey: REPO_OWNER
    remoteRef:
      key: REPO_OWNER
  - secretKey: REPO_NAME
    remoteRef:
      key: REPO_NAME
  - secretKey: WORKFLOW_ID
    remoteRef:
      key: WORKFLOW_ID
  - secretKey: WORKFLOW_BRANCH
    remoteRef:
      key: WORKFLOW_BRANCH
  
  # NEAR конфигурация для Solver Node
  - secretKey: NEAR_NETWORK
    remoteRef:
      key: NEAR_NETWORK
  - secretKey: NEAR_INTENTS_CONTRACT
    remoteRef:
      key: NEAR_INTENTS_CONTRACT
  - secretKey: NEAR_RPC_URL
    remoteRef:
      key: NEAR_RPC_URL
  
  # NEAR DEX Fee Recipient - адрес для получения комиссий с DEX
  - secretKey: NEAR_DEX_FEE_RECIPIENT
    remoteRef:
      key: NEAR_DEX_FEE_RECIPIENT
