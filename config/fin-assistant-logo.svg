<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="32" fill="url(#gradient)"/>
  
  <!-- Canton OTC Text -->
  <text x="32" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">CANTON</text>
  <text x="32" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6" font-weight="normal">OTC</text>
  
  <!-- Coin symbol -->
  <circle cx="32" cy="42" r="8" fill="white" opacity="0.9"/>
  <text x="32" y="46" text-anchor="middle" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="8" font-weight="bold">CC</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
