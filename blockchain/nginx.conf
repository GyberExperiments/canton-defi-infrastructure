events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Upstream для wallet-web-ui
    upstream wallet_web_ui {
        server wallet-web-ui:8080;
    }

    # Upstream для ans-web-ui
    upstream ans_web_ui {
        server ans-web-ui:8080;
    }

    # Upstream для validator API (gRPC Admin API)
    upstream validator_api {
        server validator:5003;
    }
    
    # Upstream для participant JSON Ledger API
    upstream participant_json_api {
        server participant:7575;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Wallet Web UI - exact match for /wallet
        location = /wallet {
            return 301 /wallet/;
        }

        # config.js - no cache (configuration file that can change)
        location = /config.js {
            set $upstream "wallet-web-ui:8080";
            
            # Check referer for /ans/ path
            if ($http_referer ~* "/ans/") {
                set $upstream "ans-web-ui:8080";
            }
            
            # If file not found, try the other upstream
            proxy_intercept_errors on;
            error_page 404 = @try_other_upstream_config;
            
            proxy_pass http://$upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # No cache for config.js
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # Fallback for config.js
        location @try_other_upstream_config {
            set $fallback_upstream "ans-web-ui:8080";
            if ($upstream = "ans-web-ui:8080") {
                set $fallback_upstream "wallet-web-ui:8080";
            }
            
            proxy_pass http://$fallback_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # No cache for config.js
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static files - smart routing based on referer and file name patterns
        # ANS files: index-ZrfCEqT9.js, wallet files: index-t66-VGVm.js
        location ~ ^/(assets|favicon\.ico|.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
            set $upstream "wallet-web-ui:8080";
            
            # Check referer for /ans/ path
            if ($http_referer ~* "/ans/") {
                set $upstream "ans-web-ui:8080";
            }
            
            # Check filename patterns for ANS (fallback if no referer)
            if ($request_uri ~* "index-ZrfCEqT9") {
                set $upstream "ans-web-ui:8080";
            }
            
            # If file not found, try the other upstream
            proxy_intercept_errors on;
            error_page 404 = @try_other_upstream;
            
            proxy_pass http://$upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache static files
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Fallback: try the other upstream if first one returns 404
        location @try_other_upstream {
            set $fallback_upstream "ans-web-ui:8080";
            if ($upstream = "ans-web-ui:8080") {
                set $fallback_upstream "wallet-web-ui:8080";
            }
            
            proxy_pass http://$fallback_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Wallet Web UI
        location /wallet/ {
            proxy_pass http://wallet-web-ui:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # WebSocket support
            proxy_read_timeout 86400;
        }

        # ANS Web UI - exact match for /ans
        location = /ans {
            return 301 /ans/;
        }

        # ANS static files (assets, config.js, etc.) - must be before /ans/ location
        # Note: ANS uses same static paths, so we handle them via /ans/ location
        # If ANS has different static paths, add separate location block here

        # ANS Web UI
        location /ans/ {
            proxy_pass http://ans-web-ui:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # WebSocket support
            proxy_read_timeout 86400;
        }

        # OIDC Discovery endpoint - proxy to auth server on port 32233
        # Replace ports 32232/32233 with port 80 in the response
        location /.well-known/openid-configuration {
            proxy_pass http://65.108.15.30:32233/.well-known/openid-configuration;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Replace ports in JSON response: 32232 -> 80, 32233 -> 80
            sub_filter 'http://65.108.15.30:32232' 'http://65.108.15.30';
            sub_filter 'http://65.108.15.30:32233' 'http://65.108.15.30';
            sub_filter_once off;
            sub_filter_types application/json;
            
            # CORS headers
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type application/json;
        }

        # JWKS endpoint - proxy to auth server on port 32233
        location /jwks {
            proxy_pass http://65.108.15.30:32233/jwks;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type application/json;
        }

        # Authorization endpoint - proxy через oidc-provider (порт 32234), который реализует OIDC flow
        location ~ ^/auth/v1/authorize {
            rewrite ^/auth/v1/authorize /authorize break;
            proxy_pass http://172.18.0.1:32234;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        # Token endpoint - proxy через oidc-provider (порт 32234)
        location ~ ^/auth/v1/token {
            rewrite ^/auth/v1/token /token break;
            proxy_pass http://172.18.0.1:32234;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers for auth endpoints
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        # Userinfo endpoint - proxy через oidc-provider (порт 32234)
        location ~ ^/auth/v1/user {
            rewrite ^/auth/v1/user /user break;
            proxy_pass http://172.18.0.1:32234;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers for auth endpoints
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        # Other auth endpoints - proxy to auth server on port 32232 (Kong)
        location /auth/v1/ {
            proxy_pass http://65.108.15.30:32232/auth/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers for auth endpoints
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Validator API - проксируем на validator-app HTTP API (порт 5003)
        # Wallet UI использует /api/validator для доступа к Validator API
        # Validator-app предоставляет HTTP REST API на порту 5003 с endpoints /api/validator/v0/wallet/*, /api/validator/v0/validator/* и т.д.
        # Согласно документации Splice, запросы должны идти на /api/validator/foobar и проксироваться на http://validator-app:5003/api/validator/foobar
        # НЕ удаляем /api/validator из пути - проксируем как есть
        location /api/validator {
            # Проксируем запрос как есть, включая /api/validator в пути
            proxy_pass http://validator_api/api/validator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Передаем Authorization header для аутентификации
            proxy_set_header Authorization $http_authorization;
            
            # CORS headers для API
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        # Другие /api запросы - проксируем как есть
        location /api {
            proxy_pass http://validator_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers для API
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Root - redirect to wallet or show info
        location = / {
            return 301 /wallet/;
        }

        # Default location
        location / {
            # Try to serve static files, fallback to wallet
            try_files $uri $uri/ /wallet;
        }
    }
}
