# Canton Validator Specific Configuration
# This file contains validator-specific settings

# Validator identity and network settings
validator {
  # Basic identity
  name = "gyber-validator"
  party-hint = "gyber-validator"
  
  # Network configuration
  network {
    # DevNet specific settings
    devnet {
      api-endpoint = "https://sv.sv-1.dev.global.canton.network.sync.global"
      onboarding-secret = "${ONBOARDING_SECRET}"
      
      # Connection settings
      connection {
        timeout = 30s
        retries = 3
        backoff-multiplier = 2.0
      }
    }
    
    # TestNet settings (for future use)
    testnet {
      api-endpoint = "https://sv.sv-1.test.global.canton.network.sync.global"
      onboarding-secret = "${TESTNET_ONBOARDING_SECRET}"
    }
    
    # MainNet settings (for future use)
    mainnet {
      api-endpoint = "https://sv.sv-1.main.global.canton.network.sync.global"
      onboarding-secret = "${MAINNET_ONBOARDING_SECRET}"
    }
  }
  
  # Validator behavior
  behavior {
    # Operating mode: 0 = validator, 1 = observer
    mode = 0
    
    # Staking settings
    staking {
      enabled = true
      auto-stake = false
      min-stake = 1000
    }
    
    # Consensus participation
    consensus {
      enabled = true
      vote-timeout = 10s
      proposal-timeout = 30s
    }
    
    # Block production
    block-production {
      enabled = true
      max-transactions-per-block = 1000
      block-time = 2s
    }
  }
  
  # Performance tuning
  performance {
    # CPU settings
    cpu {
      cores = 2
      affinity = "0,1"  # Use cores 0 and 1
    }
    
    # Memory settings
    memory {
      heap-size = "2g"
      max-heap-size = "4g"
      off-heap-size = "1g"
    }
    
    # JVM settings
    jvm {
      gc-type = "G1GC"
      gc-ratio = 0.3
      gc-threads = 2
      
      # Additional JVM options
      options = [
        "-XX:+UseG1GC",
        "-XX:MaxGCPauseMillis=200",
        "-XX:+UnlockExperimentalVMOptions",
        "-XX:+UseCGroupMemoryLimitForHeap"
      ]
    }
    
    # Network performance
    network {
      # Connection pool
      connection-pool {
        min-connections = 5
        max-connections = 20
        connection-timeout = 30s
        idle-timeout = 60s
      }
      
      # Buffer sizes
      buffers {
        read-buffer-size = 64KB
        write-buffer-size = 64KB
        max-frame-size = 1MB
      }
    }
  }
  
  # Monitoring and observability
  monitoring {
    # Metrics collection
    metrics {
      enabled = true
      port = 8080
      path = "/metrics"
      
      # Metrics to collect
      collect {
        jvm = true
        system = true
        network = true
        blockchain = true
        validator = true
      }
      
      # Export formats
      formats = ["prometheus", "json"]
    }
    
    # Health checks
    health {
      enabled = true
      port = 8081
      path = "/health"
      
      # Health check intervals
      intervals {
        liveness = 30s
        readiness = 10s
        startup = 60s
      }
    }
    
    # Admin API
    admin {
      enabled = true
      port = 8082
      path = "/admin"
      
      # Admin operations
      operations {
        restart = true
        stop = true
        status = true
        logs = true
        metrics = true
      }
    }
    
    # Logging
    logging {
      # Log levels
      levels {
        root = "INFO"
        canton = "DEBUG"
        validator = "DEBUG"
        network = "INFO"
        consensus = "DEBUG"
      }
      
      # Log formats
      formats {
        console = "colored"
        file = "json"
      }
      
      # Log files
      files {
        main = "/opt/canton/logs/validator.log"
        error = "/opt/canton/logs/validator-error.log"
        audit = "/opt/canton/logs/validator-audit.log"
      }
      
      # Log rotation
      rotation {
        max-size = "100MB"
        max-files = 10
        max-age = "7d"
      }
    }
  }
  
  # Security configuration
  security {
    # Network security
    network {
      # Firewall rules
      firewall {
        enabled = true
        
        # Allowed ports
        allowed-ports = [8080, 8081, 8082]
        
        # Blocked IPs
        blocked-ips = []
        
        # Rate limiting
        rate-limit {
          enabled = true
          requests-per-second = 100
          burst-size = 200
        }
      }
      
      # TLS/SSL
      tls {
        enabled = true
        verify-certificates = true
        cipher-suites = ["TLS_AES_256_GCM_SHA384", "TLS_CHACHA20_POLY1305_SHA256"]
      }
    }
    
    # Authentication
    auth {
      # API authentication
      api {
        enabled = false  # Disabled for DevNet
        type = "bearer"
        token = "${API_TOKEN}"
      }
      
      # Admin authentication
      admin {
        enabled = true
        type = "basic"
        username = "admin"
        password = "${ADMIN_PASSWORD}"
      }
    }
    
    # Data protection
    data {
      # Encryption at rest
      encryption {
        enabled = true
        algorithm = "AES-256-GCM"
        key = "${ENCRYPTION_KEY}"
      }
      
      # Backup encryption
      backup-encryption = true
    }
  }
  
  # Data management
  data {
    # Storage configuration
    storage {
      # Database
      database {
        type = "sqlite"
        path = "/opt/canton/data/validator.db"
        
        # Connection settings
        connection {
          pool-size = 20
          timeout = 30s
          retries = 3
        }
        
        # Performance
        performance {
          cache-size = "256MB"
          page-size = "4KB"
          synchronous = "NORMAL"
        }
      }
      
      # File system
      filesystem {
        data-dir = "/opt/canton/data"
        logs-dir = "/opt/canton/logs"
        config-dir = "/opt/canton/config"
        backup-dir = "/opt/canton/backups"
      }
    }
    
    # Backup and recovery
    backup {
      # Backup settings
      enabled = true
      interval = "24h"
      retention = "7d"
      
      # Backup locations
      locations {
        local = "/opt/canton/backups"
        remote = "${BACKUP_REMOTE_URL}"
      }
      
      # Backup encryption
      encryption = true
      
      # Compression
      compression = true
    }
    
    # Data retention
    retention {
      # Log retention
      logs = "30d"
      
      # Metrics retention
      metrics = "90d"
      
      # Backup retention
      backups = "7d"
    }
  }
}






