[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name              tail
    Path              /var/log/canton/*.log
    Parser            canton
    Tag               canton.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

[INPUT]
    Name              systemd
    Tag               systemd.*
    Systemd_Filter    _SYSTEMD_UNIT=canton-validator.service

[FILTER]
    Name                parser
    Match               canton.*
    Key_Name            log
    Parser              canton
    Reserve_Data        On
    Preserve_Key        On

[FILTER]
    Name                modify
    Match               canton.*
    Add                 hostname ${HOSTNAME}
    Add                 service canton-validator

[OUTPUT]
    Name                stdout
    Match               *
    Format              json_lines

[OUTPUT]
    Name                forward
    Match               canton.*
    Host                fluentd
    Port                24224
    Shared_Key          secret
    Self_Hostname       ${HOSTNAME}

[OUTPUT]
    Name                es
    Match               canton.*
    Host                elasticsearch
    Port                9200
    Index               canton-logs
    Type                _doc
    HTTP_User           elastic
    HTTP_Passwd         ${ELASTIC_PASSWORD}
    Logstash_Format     On
    Logstash_Prefix     canton
    Logstash_DateFormat %Y.%m.%d
    Retry_Limit         3






