# Canton Validator Configuration
# Generated for DevNet deployment

# Global configuration
canton {
  # Network configuration
  network {
    # DevNet API endpoint
    api-endpoint = "https://sv.sv-1.dev.global.canton.network.sync.global"
    
    # Connection settings
    connection-timeout = 30s
    request-timeout = 60s
    max-retries = 3
    
    # SSL/TLS settings
    tls {
      enabled = true
      verify-certificates = true
    }
  }
  
  # Validator configuration
  validator {
    # Validator identity
    name = "gyber-validator"
    party-hint = "gyber-validator"
    
    # Operating mode
    mode = 0  # 0 = validator, 1 = observer
    
    # Wallet configuration
    wallet {
      enabled = true
      auto-unlock = true
    }
    
    # Performance settings
    performance {
      # CPU cores to use
      cpu-cores = 2
      
      # Memory settings
      heap-size = "2g"
      max-heap-size = "4g"
      
      # GC settings
      gc-type = "G1GC"
      gc-ratio = 0.3
    }
    
    # Logging configuration
    logging {
      level = "INFO"
      format = "json"
      
      # Log files
      file {
        enabled = true
        path = "/opt/canton/logs/validator.log"
        max-size = "100MB"
        max-files = 10
      }
      
      # Console logging
      console {
        enabled = true
        level = "INFO"
      }
    }
    
    # Monitoring
    monitoring {
      enabled = true
      
      # Metrics
      metrics {
        enabled = true
        port = 8080
        path = "/metrics"
      }
      
      # Health checks
      health {
        enabled = true
        port = 8081
        path = "/health"
      }
      
      # Admin API
      admin {
        enabled = true
        port = 8082
        path = "/admin"
      }
    }
    
    # Security settings
    security {
      # Rate limiting
      rate-limit {
        enabled = true
        requests-per-second = 100
        burst-size = 200
      }
      
      # Authentication
      auth {
        enabled = false  # Disabled for DevNet
      }
      
      # Network security
      network {
        # Allow only specific IPs (configure as needed)
        allowed-ips = []
        
        # Block suspicious IPs
        blocked-ips = []
      }
    }
    
    # Data persistence
    storage {
      # Database settings
      database {
        type = "sqlite"
        path = "/opt/canton/data/validator.db"
        
        # Connection pool
        pool {
          min-connections = 5
          max-connections = 20
          connection-timeout = 30s
        }
      }
      
      # Backup settings
      backup {
        enabled = true
        interval = "24h"
        retention = "7d"
        path = "/opt/canton/backups"
      }
    }
    
    # Network synchronization
    sync {
      # Sync settings
      enabled = true
      
      # Block processing
      block-processing {
        batch-size = 100
        max-parallel = 4
        timeout = 30s
      }
      
      # State synchronization
      state-sync {
        enabled = true
        checkpoint-interval = 1000
        max-checkpoint-age = 3600s
      }
    }
  }
  
  # Development settings (DevNet specific)
  development {
    # Debug mode
    debug = true
    
    # Verbose logging
    verbose = true
    
    # Test mode features
    test-mode = true
    
    # Mock services (if needed)
    mock-services = false
  }
}






