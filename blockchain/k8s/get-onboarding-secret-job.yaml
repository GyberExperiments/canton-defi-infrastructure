apiVersion: batch/v1
kind: Job
metadata:
  name: get-onboarding-secret
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: canton-node-65-108-15-30
      containers:
      - name: secret-getter
        image: curlimages/curl:latest
        command: ["/bin/sh"]
        args:
          - -c
          - |
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║   Получение Onboarding Secret для Canton Devnet              ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            
            # Проверка текущего IP
            echo "1️⃣  Текущий IP-адрес ноды:"
            CURRENT_IP=$(curl -sSL http://checkip.amazonaws.com 2>/dev/null || echo "unknown")
            echo "   IP: $CURRENT_IP"
            echo ""
            
            if [ "$CURRENT_IP" != "65.108.15.30" ]; then
              echo "⚠️  ВНИМАНИЕ! IP не совпадает"
              echo "   Ожидается: 65.108.15.30"
              echo "   Получен: $CURRENT_IP"
              echo ""
              echo "Secret может получиться только с правильного IP!"
              echo ""
            fi
            
            # Запрос Onboarding Secret
            echo "2️⃣  Запрос Onboarding Secret для Devnet"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            DEVNET_API="https://sv.sv-1.dev.global.canton.network.sync.global"
            API_PATH="/api/sv/v0/devnet/onboard/validator/prepare"
            FULL_URL="${DEVNET_API}${API_PATH}"
            
            echo "API Endpoint: $FULL_URL"
            echo "Отправляю запрос..."
            echo ""
            
            # Результат запроса
            response=$(curl -s -X POST "$FULL_URL" 2>&1)
            curl_exit=$?
            
            if [ $curl_exit -ne 0 ]; then
              echo "❌ Ошибка подключения к API"
              echo "Exit code: $curl_exit"
              echo "Response: $response"
              exit 1
            fi
            
            echo "Response получен:"
            echo "$response" | head -20
            echo ""
            
            # Извлечение secret
            echo "3️⃣  Обработка ответа"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            # Проверяем наличие jq
            if command -v jq &> /dev/null; then
              secret=$(echo "$response" | jq -r '.onboarding_secret // empty' 2>/dev/null)
            else
              # Fallback без jq - простой grep
              secret=$(echo "$response" | grep -o '"onboarding_secret":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
            fi
            
            # Проверяем если ответ это base64
            if echo "$response" | grep -q "^ey" && [ ${#response} -gt 50 ]; then
              echo "ℹ️  Ответ кодирован в base64, декодирую..."
              response=$(echo "$response" | base64 -d 2>/dev/null || echo "$response")
              echo "Декодированный ответ: $response"
              echo ""
            fi
            
            # Пытаемся извлечь secret из JSON
            secret=$(echo "$response" | grep -o '"secret":"[^"]*' | cut -d'"' -f4 2>/dev/null)
            
            if [ -z "$secret" ] || [ "$secret" = "null" ]; then
              echo "❌ Не удалось извлечь Onboarding Secret"
              echo ""
              echo "Возможные причины:"
              echo "  1. IP адрес еще не добавлен в allowlist (2-7 дней ожидания)"
              echo "  2. API endpoint недоступен"
              echo "  3. Неверный формат ответа API"
              echo ""
              echo "Полный ответ:"
              echo "$response"
              exit 1
            fi
            
            echo "✅ Onboarding Secret получен успешно и декодирован!"
            echo ""
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║                      ВАЖНАЯ ИНФОРМАЦИЯ                         ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            echo "📋 Onboarding Secret:"
            echo "$secret"
            echo ""
            echo "⏱️  Validity: 1 час с момента получения"
            echo "🔒 Confidential: НИКОМУ НЕ ПЕРЕДАВАТЬ"
            echo ""
            echo "📝 Как использовать:"
            echo "1. Скопируй этот secret"
            echo "2. Добавь в config/kubernetes/k8s/canton-secrets.yaml"
            echo "3. Запусти развертывание Canton валидатора"
            echo ""
            echo "💾 Сохранение:"
            echo "Скопируй secret в:"
            echo "  config/kubernetes/k8s/canton-secrets.yaml"
            echo ""
            echo "Временные метки получения (Moscow TZ):"
            date