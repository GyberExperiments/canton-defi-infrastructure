# Внешний доступ к Ledger API participant для DeFi / dApps.
# После apply: HTTP Ledger API = http://<NODE_IP>:30757, gRPC = <NODE_IP>:30501
# NODE_IP = 65.108.15.30 (canton-node-65-108-15-30)
---
apiVersion: v1
kind: Service
metadata:
  name: participant-ledger-external
  namespace: validator
  labels:
    app: participant
spec:
  type: NodePort
  selector:
    app: participant
  ports:
    - name: json-api
      port: 7575
      targetPort: 7575
      nodePort: 30757
      protocol: TCP
    - name: lg-api
      port: 5001
      targetPort: 5001
      nodePort: 30501
      protocol: TCP
