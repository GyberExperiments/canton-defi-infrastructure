---
# Canton OTC API — Secrets
# Fill in base64-encoded values before applying:
#   echo -n "value" | base64
#
# Apply:
#   kubectl apply -f secret.yaml -n validator
#
# DevNet values (base64-encode before use):
#   operator-party-id:  otc-operator::12205aebe83cf5fabb6df16ed315a102eca1785d504405b0bb0fc243100b5a4768e4
#   trader-party-id:    otc-trader1::12205aebe83cf5fabb6df16ed315a102eca1785d504405b0bb0fc243100b5a4768e4
#   synchronizer-id:    global-domain::1220be58c29e65de40bf273be1dc2b266d43a9a002ea5b18955aeef7aac881bb471a
#   package-id:         66cfb6c5e8ef3e553a581460a0e2f24c1ffe93128f55d58e7f1bff756d976e53
#   auth-token:         <generate with scripts/generate-jwt.py>
#
# To generate the JWT (Python 3):
#   python3 scripts/generate-jwt.py
# or directly:
#   python3 -c "
#   import json,base64,hmac,hashlib,time
#   def b64(d): return base64.urlsafe_b64encode(d).rstrip(b'=').decode()
#   h=b64(json.dumps({'alg':'HS256','typ':'JWT'},separators=(',',':')).encode())
#   p=b64(json.dumps({'sub':'ledger-api-user','aud':'https://ledger_api.example.com','iss':'local','iat':int(time.time()),'exp':int(time.time())+86400*30,'scope':'daml_ledger_api','admin':True},separators=(',',':')).encode())
#   s=b64(hmac.new(b'unsafe',f'{h}.{p}'.encode(),hashlib.sha256).digest())
#   print(f'{h}.{p}.{s}')"
apiVersion: v1
kind: Secret
metadata:
  name: canton-otc-api-secrets
  namespace: validator
type: Opaque
data:
  # REQUIRED: base64-encoded values — replace placeholders below
  operator-party-id: FILL_ME_BASE64
  synchronizer-id: FILL_ME_BASE64
  package-id: NjZjZmI2YzVlOGVmM2U1NTNhNTgxNDYwYTBlMmYyNGMxZmZlOTMxMjhmNTVkNThlN2YxYmZmNzU2ZDk3NmU1Mw==
  auth-token: FILL_ME_BASE64
  # OPTIONAL: leave empty if using single-party mode
  trader-party-id: FILL_ME_BASE64
