---
# Canton OTC API — ClusterIP Service (in-cluster access)
apiVersion: v1
kind: Service
metadata:
  name: canton-otc-api
  namespace: validator
  labels:
    app: canton-otc-api
    component: api-server
spec:
  type: ClusterIP
  selector:
    app: canton-otc-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# NodePort for external dev access (port 30080 on the node IP)
# Remove in production — use Ingress instead
apiVersion: v1
kind: Service
metadata:
  name: canton-otc-api-nodeport
  namespace: validator
  labels:
    app: canton-otc-api
    component: api-server
spec:
  type: NodePort
  selector:
    app: canton-otc-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
