# Job в namespace validator: под на ноде 65.108.15.30 получает DevNet onboarding secret
# и обновляет K8s secret splice-app-validator-onboarding-validator (egress = IP ноды).
# Запуск: kubectl apply -f k8s/devnet-refresh-onboarding-secret-job.yaml
# Проверка: kubectl logs -n validator job/devnet-refresh-onboarding-secret -f
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devnet-secret-updater
  namespace: validator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devnet-secret-updater
  namespace: validator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devnet-secret-updater
  namespace: validator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: devnet-secret-updater
subjects:
  - kind: ServiceAccount
    name: devnet-secret-updater
    namespace: validator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: devnet-refresh-onboarding-secret
  namespace: validator
  annotations:
    description: "Получает DevNet onboarding secret (с ноды 65.108.15.30) и обновляет K8s secret"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: devnet-secret-updater
      hostNetwork: true
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: canton-node-65-108-15-30
      containers:
        - name: refresh
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "=== DevNet: обновление onboarding secret (egress с ноды 65.108.15.30) ==="
              apk add --no-cache curl jq ca-certificates 2>/dev/null
              API="https://sv.sv-1.dev.global.canton.network.sync.global/api/sv/v0/devnet/onboard/validator/prepare"
              echo "Запрос к API (timeout 30s)..."
              resp=$(curl -s -m 30 -X POST "$API" 2>&1) || true
              resp_trimmed=$(echo "$resp" | tr -d '\n')
              echo "Ответ API (первые 200 символов): $(echo "$resp_trimmed" | head -c 200)"
              secret=$(echo "$resp_trimmed" | jq -r '.onboarding_secret // .secret // empty' 2>/dev/null)
              if [ -z "$secret" ] || [ "$secret" = "null" ]; then
                case "$(echo "$resp_trimmed" | head -c 3)" in
                  eyJ) secret="$resp_trimmed"; echo "Используем тело ответа (base64) как secret"; ;;
                  *) echo "Ошибка: не удалось извлечь onboarding_secret. Ответ: $resp_trimmed"; exit 1; ;;
                esac
              fi
              if [ -z "$secret" ]; then exit 1; fi
              echo "Secret получен (длина ${#secret} символов)"
              apk add --no-cache wget 2>/dev/null
              KVER=$(wget -qO- https://dl.k8s.io/release/stable.txt)
              wget -qO /usr/local/bin/kubectl "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl" && chmod +x /usr/local/bin/kubectl
              echo "Обновляю K8s secret splice-app-validator-onboarding-validator..."
              /usr/local/bin/kubectl create secret generic splice-app-validator-onboarding-validator \
                --from-literal=secret="$secret" -n validator --dry-run=client -o yaml | /usr/local/bin/kubectl apply -f -
              echo "Перезапуск пода validator для подхвата secret..."
              /usr/local/bin/kubectl delete pod -n validator -l app.kubernetes.io/name=validator-app --ignore-not-found=true --timeout=30s 2>/dev/null || true
              echo "=== Готово ==="
          securityContext:
            runAsUser: 0
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
