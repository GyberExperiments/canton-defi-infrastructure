apiVersion: v1
kind: Pod
metadata:
  name: ip-validation-checker
  namespace: default
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: canton-node-65-108-15-30
  containers:
  - name: validator
    image: alpine:latest
    command: ["/bin/sh"]
    args: 
      - -c
      - |
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║   Проверка валидации IP-адреса с ноды Devnet 65.108.15.30     ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        echo ""
        
        # Установка необходимых утилит
        echo "Установка curl и jq..."
        apk add --no-cache curl jq grpcurl ca-certificates
        
        # Проверка текущего IP
        echo "1️⃣  Проверка текущего IP-адреса ноды:"
        CURRENT_IP=$(curl -sSL http://checkip.amazonaws.com 2>/dev/null || curl -sSL https://api.ipify.org 2>/dev/null)
        echo "   Текущий IP: $CURRENT_IP"
        echo ""
        
        if [ "$CURRENT_IP" = "65.108.15.30" ]; then
          echo "✅ Ноде присвоен правильный IP для Devnet!"
        else
          echo "⚠️  Внимание! IP ноды: $CURRENT_IP [ожидается 65.108.15.30]"
        fi
        echo ""
        
        # Тест №1: Scan URL
        echo "2️⃣  Тест №1: Проверка подключения к Scan URL"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        CURL='curl -fsS -m 5 --connect-timeout 5'
        
        echo "Получение списка Scan URL..."
        scan_urls=$($CURL https://scan.sv-1.dev.global.canton.network.sync.global/api/scan/v0/scans 2>/dev/null | jq -r '.scans[].scans[].publicUrl' 2>/dev/null)
        
        if [ -z "$scan_urls" ]; then
            echo "❌ Не удалось получить список Scan URL"
        else
            echo "Проверка версии для каждого Scan URL:"
            scan_success=0
            scan_fail=0
            for url in $scan_urls; do
                result=$($CURL "$url"/api/scan/version 2>&1 | jq -r '.version' 2>/dev/null)
                if [ -n "$result" ] && [ "$result" != "null" ]; then
                    echo "  ✓ $url: $result"
                    ((scan_success++))
                else
                    echo "  ✗ $url: TIMEOUT/ERROR"
                    ((scan_fail++))
                fi
            done
            echo "  Результат: $scan_success успешно, $scan_fail ошибок"
        fi
        
        echo ""
        
        # Тест №2: Sequencer
        echo "3️⃣  Тест №2: Проверка подключения к Sequencer"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        echo "Получение списка Sequencer URL..."
        sequencer_urls=$(curl -fsS -m 5 --connect-timeout 5 https://scan.sv-1.dev.global.canton.network.sync.global/api/scan/v0/dso-sequencers 2>/dev/null | jq -r '.domainSequencers[].sequencers[].url | sub("https://"; "")' 2>/dev/null)
        
        if [ -z "$sequencer_urls" ]; then
            echo "❌ Не удалось получить список Sequencer URL"
        else
            echo "Проверка статуса каждого Sequencer:"
            seq_success=0
            seq_fail=0
            for url in $sequencer_urls; do
                result=$(grpcurl --max-time 10 "$url":443 grpc.health.v1.Health/Check 2>&1)
                if echo "$result" | grep -q "SERVING"; then
                    echo "  ✓ $url: SERVING"
                    ((seq_success++))
                else
                    echo "  ✗ $url: NOT SERVING"
                    ((seq_fail++))
                fi
            done
            echo "  Результат: $seq_success успешно, $seq_fail ошибок"
        fi
        
        echo ""
        echo "╔════════════════════════════════════════════════════════════════╗"
        echo "║                        ИТОГОВЫЕ РЕЗУЛЬТАТЫ                     ║"
        echo "╚════════════════════════════════════════════════════════════════╝"
        
        if [ "${scan_fail:-0}" -eq 0 ] && [ "${seq_fail:-0}" -eq 0 ]; then
            echo "✅ ОБА ТЕСТА ПРОЙДЕНЫ УСПЕШНО!"
            echo "Ваш IP-адрес 65.108.15.30 валидирован для Devnet"
        else
            echo "⚠️  ТРЕБУЕТСЯ ДОПОЛНИТЕЛЬНАЯ ПРОВЕРКА"
            if [ "${scan_fail:-0}" -gt 0 ]; then
                echo "  • Scan: $scan_fail неудачных соединений"
            fi
            if [ "${seq_fail:-0}" -gt 0 ]; then
                echo "  • Sequencer: $seq_fail неудачных соединений"
            fi
            echo ""
            echo "Рекомендация:"
            echo "  1. Некоторые SV еще не добавили ваш IP в allowlist"
            echo "  2. Ожидание может занять 2-7 дней"
            echo "  3. Повторите проверку позже"
        fi
        
        echo ""
        echo "Проверка завершена $(date)"