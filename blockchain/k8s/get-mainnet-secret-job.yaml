apiVersion: batch/v1
kind: Job
metadata:
  name: get-mainnet-onboarding-secret
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      hostNetwork: true
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: canton-node-65-108-15-30
      containers:
      - name: secret-getter
        image: curlimages/curl:latest
        command: ["/bin/sh"]
        args:
          - -c
          - |
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║   Получение Onboarding Secret для Canton Mainnet              ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            
            # Проверка текущего IP
            echo "1️⃣  Проверка IP-адреса для запроса:"
            echo "   Используем IP: 65.108.15.19 (Mainnet)"
            
            # Проверяем наличие IP на интерфейсе
            if ip addr show | grep -q "65.108.15.19"; then
              echo "   ✅ IP адрес 65.108.15.19 найден на интерфейсе"
            else
              echo "   ⚠️  IP адрес 65.108.15.19 не найден на интерфейсе"
              echo "   Примечание: Запрос будет идти с основного IP ноды"
            fi
            echo ""
            
            # Запрос Onboarding Secret для Mainnet
            echo "2️⃣  Запрос Onboarding Secret для Mainnet"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            MAINNET_API="https://sv.sv-1.main.global.canton.network.sync.global"
            API_PATH="/api/sv/v0/mainnet/onboard/validator/prepare"
            FULL_URL="${MAINNET_API}${API_PATH}"
            
            echo "API Endpoint: $FULL_URL"
            echo "Отправляю POST запрос с IP 65.108.15.19..."
            echo ""
            
            # Делаем запрос с привязкой к IP 65.108.15.19
            response=$(curl -s -X POST --interface 65.108.15.19 "$FULL_URL" 2>&1 || curl -s -X POST "$FULL_URL" 2>&1)
            curl_exit=$?
            
            if [ $curl_exit -ne 0 ]; then
              echo "❌ Ошибка подключения к API"
              echo "Exit code: $curl_exit"
              echo "Response: $response"
              echo ""
              echo "Возможные причины:"
              echo "  1. IP адрес 65.108.15.19 не в whitelist у Super Validators"
              echo "  2. Требуется получение секрета от SV sponsor (не через публичный API)"
              echo "  3. API endpoint недоступен"
              exit 1
            fi
            
            echo "Response получен:"
            echo "$response" | head -20
            echo ""
            
            # Извлечение secret
            echo "3️⃣  Обработка ответа"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            # Проверяем наличие jq
            if command -v jq &> /dev/null; then
              secret=$(echo "$response" | jq -r '.onboarding_secret // empty' 2>/dev/null)
            else
              # Fallback без jq
              secret=$(echo "$response" | grep -o '"onboarding_secret":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
            fi
            
            # Если secret не найден, пробуем другие варианты
            if [ -z "$secret" ] || [ "$secret" = "null" ]; then
              # Пробуем найти "secret" вместо "onboarding_secret"
              if command -v jq &> /dev/null; then
                secret=$(echo "$response" | jq -r '.secret // empty' 2>/dev/null)
              else
                secret=$(echo "$response" | grep -o '"secret":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
              fi
            fi
            
            # Проверяем если ответ это base64
            if [ -z "$secret" ] && echo "$response" | grep -q "^ey" && [ ${#response} -gt 50 ]; then
              echo "ℹ️  Ответ кодирован в base64, декодирую..."
              decoded=$(echo "$response" | base64 -d 2>/dev/null || echo "$response")
              echo "Декодированный ответ: $decoded"
              echo ""
              
              # Пробуем извлечь secret из декодированного ответа
              if command -v jq &> /dev/null; then
                secret=$(echo "$decoded" | jq -r '.onboarding_secret // .secret // empty' 2>/dev/null)
              else
                secret=$(echo "$decoded" | grep -o '"onboarding_secret":"[^"]*"' | cut -d'"' -f4 2>/dev/null || echo "$decoded" | grep -o '"secret":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
              fi
            fi
            
            if [ -z "$secret" ] || [ "$secret" = "null" ]; then
              echo "❌ Не удалось извлечь Onboarding Secret"
              echo ""
              echo "Полный ответ API:"
              echo "$response"
              echo ""
              echo "Возможные причины:"
              echo "  1. IP адрес 65.108.15.19 еще не добавлен в allowlist (требуется 2-7 дней)"
              echo "  2. Для Mainnet требуется получение секрета от SV sponsor (не через публичный API)"
              echo "  3. API endpoint недоступен или вернул ошибку"
              echo "  4. Неверный формат ответа API"
              echo ""
              echo "Рекомендации:"
              echo "  • Свяжитесь с вашим SV sponsor для получения Mainnet onboarding secret"
              echo "  • Убедитесь, что IP 65.108.15.19 полностью валидирован"
              echo "  • Проверьте статус валидации: kubectl apply -f blockchain/k8s/ip-validation-mainnet.yaml"
              exit 1
            fi
            
            echo "✅ Onboarding Secret получен успешно!"
            echo ""
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║                      ВАЖНАЯ ИНФОРМАЦИЯ                         ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            echo "📋 Mainnet Onboarding Secret:"
            echo "$secret"
            echo ""
            echo "⏱️  Validity: Зависит от политики сети Mainnet"
            echo "🔒 Confidential: НИКОМУ НЕ ПЕРЕДАВАТЬ"
            echo ""
            echo "📝 Как использовать:"
            echo "1. Скопируй этот secret"
            echo "2. Добавь в переменные окружения валидатора:"
            echo "   export ONBOARDING_SECRET=\"$secret\""
            echo "3. Или сохрани в config/onboarding-secrets.env:"
            echo "   MAINNET_ONBOARDING_SECRET=$secret"
            echo "4. Запусти развертывание Canton валидатора для Mainnet"
            echo ""
            echo "💾 Сохранение:"
            echo "Скопируй secret в:"
            echo "  blockchain/config/onboarding-secrets.env"
            echo ""
            echo "Временные метки получения (Moscow TZ):"
            date





