apiVersion: batch/v1
kind: Job
metadata:
  name: sync-connect
  namespace: validator
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: connect
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "======================================================================"
            echo " Canton DevNet Synchronizer Connection"
            echo "======================================================================"
            
            # Download and install grpcurl
            cd /tmp
            curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz | tar xz
            chmod +x grpcurl
            
            P="participant.validator.svc.cluster.local:5002"
            
            echo ""
            echo "Current connections:"
            ./grpcurl -plaintext -d '{}' $P \
              com.digitalasset.canton.admin.participant.v30.SynchronizerConnectivityService.ListConnectedSynchronizers || true
            
            echo ""
            echo "Connecting to global synchronizer..."
            
            ./grpcurl -plaintext -d '{
              "config": {
                "synchronizer_alias": "global",
                "sequencer_connections": {
                  "sequencer_connections": [{
                    "grpc": {
                      "connections": ["https://sequencer-1.sv-1.dev.global.canton.network.sync.global"],
                      "transport_security": true
                    }
                  }],
                  "sequencer_trust_threshold": 1,
                  "submission_request_amplification": {
                    "factor": 1,
                    "patience": "0s"
                  },
                  "sequencer_liveness_margin": 0,
                  "sequencer_connection_pool_delays": {
                    "min_restart_delay": "1s",
                    "max_restart_delay": "30s",
                    "subscription_request_delay": "0s",
                    "warn_validation_delay": "10s"
                  }
                },
                "manual_connect": false,
                "time_tracker": {}
              }
            }' $P com.digitalasset.canton.admin.participant.v30.SynchronizerConnectivityService.ConnectSynchronizer
            
            echo ""
            echo "Waiting 20s..."
            sleep 20
            
            echo ""
            echo "Final check:"
            ./grpcurl -plaintext -d '{}' $P \
              com.digitalasset.canton.admin.participant.v30.SynchronizerConnectivityService.ListConnectedSynchronizers
            
            echo ""
            echo "======================================================================"
